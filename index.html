<!doctype html>
<html lang="en">

<head>
  <title>Gorjeta</title>
  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/x-icon">
  <!-- Bootstrap CSS v5.2.1 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  <!-- Um dos modos de adicionar fontes na pagina via url -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap">
  <!-- Estilização da pagina -->
  <link rel="stylesheet" href="estilo.css">
  <!-- Responsivo da pagina -->
  <link rel="stylesheet" href="responsivo.css">
</head>

<body>
  <main class="container">
    <h1 class="text-uppercase">Spli <br> tter</h1>
    <div id="fundo" class="bg-white p-4 rounded-4">
      <section class="taxa">
        <label>Bill</label><br>
        <img class="imgInput" src="images/icon-dollar.svg" alt="Dolar"> </img>
        <input id="inputConta" class="input text-end rounded-2" type="text" placeholder="0">

        <h6 class="pt-4"> Select Tip %</h6>
        <ul class="row">
          <li class="colunas btn col-3 rounded-3" onclick="calcularGorjeta(5)">5%</li>
          <li class="colunas btn col-3 rounded-3" onclick="calcularGorjeta(10)">10%</li>
          <li class="colunas btn col-3 rounded-3" onclick="calcularGorjeta(15)">15%</li>
          <li class="colunas btn col-3 rounded-3" onclick="calcularGorjeta(25)">25%</li>
          <li class="colunas btn col-3 rounded-3" onclick="calcularGorjeta(50)">50%</li>
          <input class="colunas col-3 rounded-3" id="custom" type="text" placeholder="Custom"
            oninput="calcularGorjeta(parseFloat(this.value))">
          <!-- oninput é quando o valor é alterado -->
        </ul>

        <div class="d-flex">
          <label>Number of People</label>
          <p id="resQtdPessoas">&ensp;</p>
        </div>

        <img class="imgInput" src="images/icon-person.svg" alt="Usuario">
        <input onkeyup="calcularGorjeta()" id="inputPessoas" class="input text-end rounded-2" type="text"
          placeholder="0">
      </section>

      <section id="conta" class="text-white  rounded-3">
        <div class="d-flex">
          <div>
            <h5>Tip Amount</h5>
            <p class="transparente">/ person</p>
          </div>

          <div class="gorjeta">
            <img class="imgDolar1" src="images/icon-dollar.svg" alt="">
            <p id="resGorjeta">0.00</p>
          </div>
        </div>

        <div class="d-flex mt-4">
          <div>
            <h5>Total</h5>
            <p class="transparente">/ person</p>
          </div>

          <div class="total">
            <img class="imgDolar2" src="images/icon-dollar.svg" alt="">
            <p id="resTotal" class="ps-3 mb-5">0.00</p>
          </div>
        </div>

        <button id="btnReset" onclick="resetarValores()" class="btn w-100 mt-5 text-uppercase">Reset</button>
      </section>
    </div>
  </main>

  <script src="conta.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
    integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
    crossorigin="anonymous"></script>
</body>

</html>
